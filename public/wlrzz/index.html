      --text: #111111;
      --muted: #888888;
      --btn: #1a1a1a;
      --progress-bg: #e0deda;
      --opt-bg: #f9f9f7;
      --opt-hover: #f0efeb;
    }

    html, body {

      background: var(--bg);
      color: var(--text);

      line-height: 1.6;

    .wrap { max-width: 720px; margin: 0 auto; padding: 0 1.25rem 5rem; }

    /* ══════ LANDING ══════ */

    #page-quiz    { display: none; }
    #page-result  { display: none; }

    .hero { text-align: center; padding: 4rem 0 3rem; }
    .eyebrow { font-size: 0.88rem; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 1.25rem; text-transform: uppercase; }
    .hero-title {
      font-size: clamp(2rem, 6vw, 3.4rem);
      font-weight: 900; line-height: 1.2; letter-spacing: -0.02em;

    .hero-sub { font-size: 1rem; color: #555; line-height: 1.75; margin-bottom: 2.5rem; }
    .start-btn {

      transition: background 0.18s, transform 0.15s;
      letter-spacing: 0.03em; font-family: inherit;

    .start-btn:hover { background: #000; transform: translateY(-2px); }
    .start-btn:active { transform: translateY(0); }
    .disclaimer { margin-top: 1.5rem; font-size: 0.78rem; color: #aaa; line-height: 1.65; max-width: 460px; margin-left: auto; margin-right: auto; }

    .char-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; margin-top: 1.5rem; }
    .char-card {
      display: flex; align-items: center; gap: 1rem; padding: 1.25rem;
      background: var(--card); border-radius: 14px; border: 1px solid var(--border);
      transition: box-shadow 0.18s, transform 0.18s;
    }
    .char-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.08); transform: translateY(-2px); }
    .char-emoji {
      width: 52px; height: 52px; font-size: 2rem;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); border-radius: 10px; flex-shrink: 0;
      overflow: hidden; position: relative;
    }
    .char-photo {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      border-radius: 10px;
    }
    .char-info { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
    .char-id { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .char-name { font-size: 1.05rem; font-weight: 700; color: var(--text); }
    .char-type { font-size: 0.78rem; color: var(--muted); }

    /* ══════ QUIZ ══════ */
    .quiz-wrap { padding: 2.5rem 1.25rem 5rem; max-width: 720px; margin: 0 auto; }
    .progress-area { margin-bottom: 1.75rem; }
    .progress-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; letter-spacing: 0.04em; }
    .progress-count { display: flex; align-items: baseline; gap: 0.15rem; margin-bottom: 0.9rem; }
    .p-num { font-size: 2rem; font-weight: 900; color: var(--text); font-variant-numeric: tabular-nums; }
    .p-sep { font-size: 1.4rem; font-weight: 500; color: #bbb; padding: 0 0.2rem; }
    .p-total { font-size: 2rem; font-weight: 900; color: #333; font-variant-numeric: tabular-nums; }
    .progress-track { height: 4px; background: var(--progress-bg); border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--btn); border-radius: 999px; transition: width 0.35s cubic-bezier(.4,0,.2,1); }

    .q-card { background: var(--card); border-radius: 18px; padding: 2rem 2rem 1.5rem; border: 1px solid var(--border); }
    .q-meta { font-size: 0.85rem; color: #999; margin-bottom: 0.8rem; letter-spacing: 0.06em; }

    .options { display: flex; flex-direction: column; gap: 0.85rem; margin-bottom: 1.5rem; }
    .opt {
      width: 100%; text-align: left; padding: 1.1rem 1.25rem;

    .opt.selected .opt-main { color: #fff !important; }
    .opt.selected .opt-sub  { color: rgba(255,255,255,.65) !important; }
    .opt.dimmed { opacity: 0.35; }
    .opt.locked { cursor: default; }
    .opt-main { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.4; }
    .opt-sub  { font-size: 0.82rem; color: var(--muted); line-height: 1.4; }

    .q-actions { display: flex; }
    .prev-btn {
      padding: 0.55rem 1.25rem; border-radius: 999px;
      border: 1.5px solid #ddd; background: transparent; color: #555;

    .r-card { background: var(--card); border-radius: 20px; border: 1.5px solid var(--border); overflow: hidden; }

    .r-photo.has-photo { display: block; }

    .r-header-text { display: flex; flex-direction: column; gap: 0.3rem; }
    .r-you-are { font-size: 0.82rem; color: var(--muted); letter-spacing: 0.06em; }
    .r-name { font-size: 2.2rem; font-weight: 900; color: var(--text); line-height: 1.15; letter-spacing: -0.02em; }
    .r-badge { display: inline-block; color: #fff; font-size: 0.78rem; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 999px; width: fit-content; letter-spacing: 0.04em; }

    .r-slogan { font-size: 1.15rem; font-weight: 700; font-style: italic; color: #222; line-height: 1.5; }
    .r-desc { font-size: 0.95rem; line-height: 1.85; color: #444; }

    .attrs { display: flex; flex-direction: column; gap: 1rem; }

    .attr-top { display: flex; justify-content: space-between; align-items: baseline; }
    .attr-label { font-size: 0.85rem; font-weight: 600; color: #333; }

    .copy-btn:hover { background: #000; transform: translateY(-1px); }
    .copy-btn.copied { background: #16a34a; }
    .restart-btn { padding: 0.85rem 1.5rem; background: transparent; color: #555; border: 1.5px solid #ddd; border-radius: 999px; font-size: 0.92rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.15s, border-color 0.15s, color 0.15s; white-space: nowrap; }

    .page-footer { text-align: center; margin-top: 2rem; font-size: 0.78rem; color: #bbb; letter-spacing: 0.05em; }

      .char-photo { border-radius: 8px; }
      .quiz-wrap { padding: 1.5rem 1rem 4rem; }
      .q-card { padding: 1.5rem 1.25rem 1.25rem; border-radius: 14px; }
      .p-num, .p-total { font-size: 1.6rem; }
      .p-sep { font-size: 1.2rem; }
      .opt { padding: 1rem; border-radius: 10px; }
      .result-wrap { padding: 1.5rem 1rem 4rem; }

      .r-photo { border-radius: 14px; }
      .r-emoji { font-size: 2rem; }
      .r-name { font-size: 1.8rem; }
      .r-section { padding: 1.25rem; }
      .r-actions { flex-direction: column; }
      .copy-btn, .restart-btn { width: 100%; text-align: center; }
    }

</head>

</div>

    </div>
    <p class="page-footer">赛博人物志 · 纯属整活</p>
  </div>
</div>

/* ══════════════════════════════════════
   状态
══════════════════════════════════════ */
let currentQ = 0;
let answers  = [];
let locked   = false;

/* ══════════════════════════════════════
   初始化 Landing
══════════════════════════════════════ */
(function initLanding() {
  const grid = document.getElementById('char-grid');
  CHARACTERS.forEach(c => {
    const div = document.createElement('div');
    div.className = 'char-card';
    const photoHtml = c.photo
      ? `<img class="char-photo" src="${c.photo}" alt="${c.name}" />`
      : c.emoji;
    div.innerHTML = `
      <div class="char-emoji">${photoHtml}</div>
      <div class="char-info">
        <div class="char-name">${c.name}</div>
        <div class="char-type">${c.type}</div>
      </div>`;
    grid.appendChild(div);
  });
})();

/* ══════════════════════════════════════
   流程控制
══════════════════════════════════════ */
function showPage(id) {
  ['page-landing','page-quiz','page-result'].forEach(p => {
    document.getElementById(p).style.display = 'none';
  });
  document.getElementById(id).style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function startQuiz() {
  currentQ = 0;
  answers  = [];
  locked   = false;
  renderQuestion();
  showPage('page-quiz');
}

function restart() {
  showPage('page-landing');
}

/* ══════════════════════════════════════
   答题渲染
══════════════════════════════════════ */
function renderQuestion() {
  const total = QUESTIONS.length;
  const q     = QUESTIONS[currentQ];
  locked      = false;

  document.getElementById('p-current').textContent  = currentQ;
  document.getElementById('p-total').textContent    = total;
  document.getElementById('q-num').textContent      = currentQ + 1;
  document.getElementById('q-total').textContent    = total;
  document.getElementById('progress-fill').style.width = (currentQ / total * 100) + '%';
  document.getElementById('q-text').textContent = q.text;

  const container = document.getElementById('options');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-main">${opt.text}</span><span class="opt-sub">${opt.sub}</span>`;
    btn.addEventListener('click', () => selectOption(i));
    container.appendChild(btn);
  });

  document.getElementById('prev-btn').disabled = currentQ === 0;
}

function selectOption(index) {
  if (locked) return;
  locked = true;

  const q    = QUESTIONS[currentQ];
  const opts = document.querySelectorAll('#options .opt');
  opts.forEach((btn, i) => {
    btn.classList.add('locked');
    if (i === index) btn.classList.add('selected');
    else btn.classList.add('dimmed');
  });

  const newAnswers = [...answers, q.options[index].w];

  setTimeout(() => {
    if (currentQ + 1 >= QUESTIONS.length) {
      showResult(newAnswers);
    } else {
      answers = newAnswers;
      currentQ++;
      renderQuestion();
    }
  }, 380);
}

function prevQuestion() {
  if (currentQ === 0 || locked) return;
  answers = answers.slice(0, -1);
  currentQ--;
  renderQuestion();
}

/* ══════════════════════════════════════
   结果计算 & 渲染
══════════════════════════════════════ */
function calcResult(ansArr) {
  const total = {};
  ansArr.forEach(w => {
    Object.entries(w).forEach(([id, score]) => {
      total[id] = (total[id] || 0) + score;
    });
  });
  const sorted   = Object.entries(total).sort((a,b) => b[1]-a[1]);
  const winnerId = sorted[0]?.[0] || 'DONGYOU_GUAIGE';
  return CHARACTERS.find(c => c.id === winnerId) || CHARACTERS[4];
}

function showResult(ansArr) {
  const c = calcResult(ansArr);

  document.getElementById('r-header').style.background = c.colorLight;
  document.getElementById('r-emoji').textContent  = c.emoji;
  const photoEl = document.getElementById('r-photo');
  if (c.photo) {
    photoEl.src = c.photo;
    photoEl.alt = c.name;
    photoEl.className = 'r-photo has-photo';
  } else {
    photoEl.src = '';
    photoEl.className = 'r-photo';
  }
  document.getElementById('r-name').textContent   = c.name;
  const badge = document.getElementById('r-badge');
  badge.textContent      = c.type;
  badge.style.background = c.color;

  document.getElementById('r-slogan').textContent = `"${c.slogan}"`;
  document.getElementById('r-desc').textContent   = c.description;

  const attrsEl = document.getElementById('r-attrs');
  attrsEl.innerHTML = '';
  c.attrs.forEach(attr => {
    attrsEl.innerHTML += `
      <div class="attr-row">
        <div class="attr-top">
          <span class="attr-label">${attr.label}</span>
          <span class="attr-val" style="color:${c.color}">${attr.value}%</span>
        </div>
        <div class="attr-track">
          <div class="attr-fill" style="width:${attr.value}%;background:${c.color}"></div>
        </div>
      </div>`;
  });

  const phrasesEl = document.getElementById('r-phrases');
  phrasesEl.innerHTML = '';
  c.catchphrase.forEach(p => {
    phrasesEl.innerHTML += `<span class="phrase-tag">${p}</span>`;
  });

  const copyBtn = document.getElementById('copy-btn');
  copyBtn.textContent = '复制结果分享';
  copyBtn.classList.remove('copied');

  showPage('page-result');
}

/* ══════════════════════════════════════
   分享
══════════════════════════════════════ */
function copyResult() {
  const name   = document.getElementById('r-name').textContent;
  const badge  = document.getElementById('r-badge').textContent;
  const emoji  = document.getElementById('r-emoji').textContent;
  const slogan = document.getElementById('r-slogan').textContent;
  const text   = `我在「赛博人物志」测出来是：${name} · ${badge} ${emoji}\n${slogan}\n你是哪位互联网传奇？→ ${location.href}`;

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✓ 已复制到剪贴板';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制结果分享';
      btn.classList.remove('copied');
    }, 2500);
  }).catch(() => {
    alert('复制失败，请手动复制链接分享。');
  });
}
